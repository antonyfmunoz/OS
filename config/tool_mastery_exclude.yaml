# Tool Mastery Manager — exclusion list.
#
# Slugs listed here are dropped from discovery results BEFORE they reach
# the coverage evaluator. This is how we suppress ghost / abandoned /
# uninstalled-plugin MCP entries that continue to surface from
# ~/.claude.json long after their underlying project no longer exists.
#
# Rules:
#   - One slug per entry. Use snake_case (same normalisation as
#     discovery.normalise_slug).
#   - Always include a `reason:` and an `audit:` pointer. Future
#     maintainers need to know *why* the exclusion exists or they will
#     delete it "for cleanliness" and the ghost entry will return.
#   - Exclusion is final: an excluded slug never appears in discovery
#     output regardless of which source surfaced it. If you need to
#     re-include a tool, remove its entry here AND add it to
#     config/tool_mastery_seeds.yaml if it's truly in scope.
#
# Format:
#   exclude_slugs:
#     - slug: <snake_case_slug>
#       reason: "<short human rationale>"
#       audit: "docs/audits/<file>.md"

exclude_slugs:
  - slug: goviralbitch
    reason: >-
      Ghost mcpServers entry in ~/.claude.json under a non-existent
      /opt/OS/goviralbitch project block. Points at scripts/init-viral-command.sh
      which does not exist. Originally sourced from the uninstalled
      marketplace plugin charlesdove977/goviralbitch. Not a real tool.
    audit: docs/audits/2026-04-08-tool-mastery-manager-batch1-remediation.md
