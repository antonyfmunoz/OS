version: '3.8'

# NOTE: top-level env_file is not valid in compose v3.8.
# Each service declares its own env_file below.

networks:
  eos_network:
    driver: bridge

services:
  os-bot:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    container_name: os-bot
    restart: always
    working_dir: /app
    command: python3 umh/interfaces/telegram/bot.py
    networks:
      - eos_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${UMH_ROOT:-/opt/OS}:/app
    env_file:
      - ./services.env
    environment:
      - PYTHONPATH=/app
      - TZ=America/Los_Angeles
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434

  os-monitor:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    container_name: os-monitor
    restart: always
    working_dir: /app
    command: python3 -u umh/interfaces/discord/dm_monitor.py
    # network_mode: host was removed — Playwright does not require host networking.
    # Bridge provides outbound internet access for Instagram/Apify calls.
    networks:
      - eos_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${UMH_ROOT:-/opt/OS}:/app
      - ${UMH_ROOT:-/opt/OS}/logs:${UMH_ROOT:-/opt/OS}/logs
    env_file:
      - ./services.env
      - ./umh.env
    shm_size: '2gb'
    environment:
      - PYTHONPATH=/app
      - TZ=America/Los_Angeles
      - PYTHONUNBUFFERED=1
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434

  os-scraper:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    container_name: os-scraper
    restart: "no"
    working_dir: /app
    command: python3 tools/overnight_scrape.py
    networks:
      - eos_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${UMH_ROOT:-/opt/OS}:/app
    env_file:
      - ./services.env
      - ./umh.env
    environment:
      - PYTHONPATH=/app
      - TZ=America/Los_Angeles
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434

  os-webhook:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    container_name: os-webhook
    restart: always
    working_dir: /app
    command: python3 umh/interfaces/webhooks/calendly.py
    networks:
      - eos_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${UMH_ROOT:-/opt/OS}:/app
    env_file:
      - ./services.env
    environment:
      - PYTHONPATH=/app
      - TZ=America/Los_Angeles
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    ports:
      - "8080:8080"

  os-discord:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    container_name: os-discord
    restart: on-failure
    working_dir: /app
    # network_mode: host was removed — Discord bot only makes outbound HTTPS
    # calls to discord.com. Bridge networking provides full internet access.
    networks:
      - eos_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "0.0.0.0:8765:8765"
    volumes:
      - ${UMH_ROOT:-/opt/OS}:/app
      - ${UMH_ROOT:-/opt/OS}/logs:${UMH_ROOT:-/opt/OS}/logs
      - /root/.config/gws:/root/.config/gws
      - /root/.config/@googleworkspace:/root/.config/@googleworkspace
      - /root/.claude:/root/.claude:ro
      - /root/.claude.json:/root/.claude.json:ro
      # Host tmux socket — lets the router's claude_cli backend reach the
      # host's `dex_main` Claude Code session from inside the container.
      # Host server lives at /tmp/tmux-0/default (root UID 0); container is
      # also root so the default socket path resolves identically.
      - /tmp/tmux-0:/tmp/tmux-0
    env_file:
      - ./services.env
      - ./umh.env
    environment:
      - PYTHONPATH=/app
      - TZ=America/Los_Angeles
      - PYTHONUNBUFFERED=1
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OTEL_TRACES_EXPORTER=none
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
      - ANTHROPIC_DISABLE_TELEMETRY=1

      - EOS_ROUTER_CLAUDE_CLI_ENABLED=1
      - EOS_ROUTER_CLAUDE_CLI_TARGET=vps
      - EOS_ROUTER_CLAUDE_CLI_SESSION=dex_main
      # Force default tmux socket dir so container tmux binds to the mounted
      # host socket rather than a container-private one.
      - TMUX_TMPDIR=/tmp

      - EOS_DISCORD_TEXT_TRANSPORT_ENABLED=1
      - EOS_DISCORD_TEXT_REPLY_TTS_ENABLED=1
      - EOS_DISCORD_TEXT_ALLOWED_GUILDS=*
      - EOS_DISCORD_TEXT_ALLOWED_CHANNELS=*
      - EOS_DISCORD_TEXT_ALLOWED_USERS=*
    command: python3 umh/interfaces/discord/bot.py
