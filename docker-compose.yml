version: '3.8'

# NOTE: top-level env_file is not valid in compose v3.8.
# Each service declares its own env_file below.

networks:
  eos_network:
    driver: bridge

services:
  os-bot:
    build: .
    container_name: os-bot
    restart: always
    working_dir: /app
    command: python3 services/telegram_control.py
    networks:
      - eos_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /opt/OS:/app
    env_file:
      - services/.env
    environment:
      - PYTHONPATH=/app
      - TZ=America/Los_Angeles
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434

  os-monitor:
    build: .
    container_name: os-monitor
    restart: always
    working_dir: /app
    command: python3 -u services/dm_monitor.py
    # network_mode: host was removed — Playwright does not require host networking.
    # Bridge provides outbound internet access for Instagram/Apify calls.
    networks:
      - eos_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /opt/OS:/app
      - /opt/OS/logs:/opt/OS/logs
    env_file:
      - services/.env
      - eos_ai/.env
    shm_size: '2gb'
    environment:
      - PYTHONPATH=/app
      - TZ=America/Los_Angeles
      - PYTHONUNBUFFERED=1
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434

  os-scraper:
    build: .
    container_name: os-scraper
    restart: "no"
    working_dir: /app
    command: python3 services/overnight_scrape.py
    networks:
      - eos_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /opt/OS:/app
    env_file:
      - services/.env
      - eos_ai/.env
    environment:
      - PYTHONPATH=/app
      - TZ=America/Los_Angeles
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434

  os-webhook:
    build: .
    container_name: os-webhook
    restart: always
    working_dir: /app
    command: python3 services/calendly_webhook.py
    networks:
      - eos_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /opt/OS:/app
    env_file:
      - services/.env
    environment:
      - PYTHONPATH=/app
      - TZ=America/Los_Angeles
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    ports:
      - "8080:8080"

  os-discord:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: os-discord
    restart: on-failure
    working_dir: /app
    # network_mode: host was removed — Discord bot only makes outbound HTTPS
    # calls to discord.com. Bridge networking provides full internet access.
    networks:
      - eos_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /opt/OS:/app
      - /opt/OS/logs:/opt/OS/logs
      - /root/.config/gws:/root/.config/gws
      - /root/.config/@googleworkspace:/root/.config/@googleworkspace
    env_file:
      - services/.env
      - eos_ai/.env
    environment:
      - PYTHONPATH=/app
      - TZ=America/Los_Angeles
      - PYTHONUNBUFFERED=1
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    command: python3 services/discord_bot.py
