# NOTE: top-level env_file is not valid in compose.
# Each service declares its own env_file below.

networks:
  eos_network:
    driver: bridge

services:
  os-scraper:
    build: .
    container_name: os-scraper
    restart: "no"
    working_dir: /app
    command: python3 services/overnight_scrape.py
    networks:
      - eos_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${UMH_ROOT:-/opt/OS}:/app
    env_file:
      - services/.env
      - infra/docker/umh.env
    environment:
      - PYTHONPATH=/app
      - UMH_ROOT=/app
      - TZ=America/Los_Angeles
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434

  os-webhook:
    build: .
    container_name: os-webhook
    restart: always
    working_dir: /app
    command: python3 transports/api/webhooks/calendly_webhook.py
    networks:
      - eos_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${UMH_ROOT:-/opt/OS}:/app
    env_file:
      - services/.env
      - infra/docker/umh.env
    environment:
      - PYTHONPATH=/app
      - UMH_ROOT=/app
      - TZ=America/Los_Angeles
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: 128M

  os-discord:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: os-discord
    restart: on-failure
    working_dir: /app
    # network_mode: host was removed — Discord bot only makes outbound HTTPS
    # calls to discord.com. Bridge networking provides full internet access.
    networks:
      - eos_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "0.0.0.0:8765:8765"
    volumes:
      - ${UMH_ROOT:-/opt/OS}:/app
      - ${UMH_ROOT:-/opt/OS}/logs:${UMH_ROOT:-/opt/OS}/logs
      - /root/.config/gws:/root/.config/gws
      - /root/.config/@googleworkspace:/root/.config/@googleworkspace
      - /root/.claude:/root/.claude:ro
      - /root/.claude.json:/root/.claude.json:ro
      # Host tmux socket — lets the router's claude_cli backend reach the
      # host's `dex_main` Claude Code session from inside the container.
      # Host server lives at /tmp/tmux-0/default (root UID 0); container is
      # also root so the default socket path resolves identically.
      - /tmp/tmux-0:/tmp/tmux-0
    env_file:
      - services/.env
      - infra/docker/umh.env
    environment:
      - PYTHONPATH=/app
      - UMH_ROOT=/app
      - TZ=America/Los_Angeles
      - PYTHONUNBUFFERED=1
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OTEL_TRACES_EXPORTER=none
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
      - ANTHROPIC_DISABLE_TELEMETRY=1
      - CC_SDK_TIMEOUT_SECONDS=180

      - EOS_ROUTER_CLAUDE_CLI_ENABLED=1
      - EOS_ROUTER_CLAUDE_CLI_TARGET=vps
      - EOS_ROUTER_CLAUDE_CLI_SESSION=dex_main
      # Force default tmux socket dir so container tmux binds to the mounted
      # host socket rather than a container-private one.
      - TMUX_TMPDIR=/tmp

      - EOS_DISCORD_TEXT_TRANSPORT_ENABLED=1
      - EOS_DISCORD_TEXT_REPLY_TTS_ENABLED=1
      - EOS_DISCORD_TEXT_ALLOWED_GUILDS=*
      - EOS_DISCORD_TEXT_ALLOWED_CHANNELS=*
      - EOS_DISCORD_TEXT_ALLOWED_USERS=*
    command: python3 services/discord_bot.py
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  os-operator:
    build: .
    container_name: os-operator
    restart: unless-stopped
    working_dir: /app
    command: python3 -m uvicorn services.operator_api:app --host 0.0.0.0 --port 8091
    networks:
      - eos_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${UMH_ROOT:-/opt/OS}:/app
    env_file:
      - services/.env
      - infra/docker/umh.env
    environment:
      - PYTHONPATH=/app
      - UMH_ROOT=/app
      - TZ=America/Los_Angeles
      - PYTHONUNBUFFERED=1
      - UMH_OPERATOR_API_KEY=${UMH_OPERATOR_API_KEY:-dev-key-change-me}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    ports:
      - "8091:8091"
    deploy:
      resources:
        limits:
          memory: 512M
